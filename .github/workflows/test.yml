name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -cover ./...
      - name: Build
        run: go build -o /tmp/plinth ./cmd/plinth
      - name: Smoke
        run: |
          /tmp/plinth version
          /tmp/plinth --help
